const { useState, useEffect, useRef } = React;

/* ═══════════════ HOOKS ═══════════════ */
function useScrollY() {
  const [y, setY] = useState(0);
  useEffect(() => {
    const h = () => setY(window.scrollY);
    window.addEventListener("scroll", h, { passive: true });
    return () => window.removeEventListener("scroll", h);
  }, []);
  return y;
}

function useInView(threshold = 0.12) {
  const ref = useRef(null);
  const [vis, setVis] = useState(false);
  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) { setVis(true); obs.disconnect(); }
    }, { threshold });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, [threshold]);
  return [ref, vis];
}

function Reveal({ children, delay = 0, className = "" }) {
  const [ref, vis] = useInView();
  return (
    <div ref={ref} className={className} style={{
      opacity: vis ? 1 : 0,
      transform: vis ? "translateY(0)" : "translateY(50px)",
      transition: `opacity 1.2s cubic-bezier(.16,1,.3,1) ${delay}s, transform 1.2s cubic-bezier(.16,1,.3,1) ${delay}s`,
    }}>
      {children}
    </div>
  );
}

/* ═══════════════ LANDING PAGE ═══════════════ */
function LandingPage() {
  const scrollY = useScrollY();
  const [introOut, setIntroOut] = useState(false);
  const [loaded,   setLoaded]   = useState(false);

  useEffect(()=>{
    const t1 = setTimeout(()=>setLoaded(true), 200);
    const t2 = setTimeout(()=>setIntroOut(true), 2400);
    return ()=>{ clearTimeout(t1); clearTimeout(t2); };
  },[]);

  const progress = typeof document !== "undefined"
    ? Math.min((scrollY / Math.max(document.body.scrollHeight - window.innerHeight, 1)) * 100, 100)
    : 0;

  return (
    <div style={{background:"#F3E9DC",color:"#5E3023",fontFamily:"'DM Serif Display',Georgia,serif",overflowX:"hidden"}}>
      <div className="scroll-progress" style={{width:`${progress}%`}}/>
      <IntroLoader loaded={loaded} out={introOut}/>
      <Navbar/>
      <Hero introOut={introOut}/>
      <MarqueeStrip/>
      <Philosophy/>
      <RoomsSection/>
      <Experience/>
      <Quote/>
      <FAQ/>
      <Footer/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<LandingPage/>);
</script>
</body>
</html>
